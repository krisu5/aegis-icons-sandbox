name: SVG Cleanup

on:
  push:
    branches:
      - master
    paths:
      - 'icons/**/*.svg'

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'icons/**/*.svg'

  workflow_dispatch:

jobs:
  svgo:
    name: Run SVGO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SVGO
        run: |
          npm install svgo@2 --no-save
          echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH

      - name: Run SVGO
        run: bash _compress/optimise.sh

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain icons/)" ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            git add icons/
            git commit -m "style: apply SVG compression and cleanup"

            # Only push if we have permission (i.e., not a fork)
            git push || echo "Push failed (likely a fork PR). Please apply changes manually."
          else
            echo "No changes detected."
          fi
