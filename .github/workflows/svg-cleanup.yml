name: SVG Cleanup

on:
  push:
    branches:
      - master
    paths:
      - 'icons/**/*.svg'

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'icons/**/*.svg'

  workflow_dispatch:

jobs:
  svgo:
    name: Run SVGO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SVGO
        run: |
          npm install svgo@2 --no-save
          echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH

      - name: Run SVGO
        run: bash _compress/optimise.sh

      - name: Commit and push changes
        run: |
          # Get list of changed files under icons/ (both tracked and new)
          CHANGED=$(git status --porcelain=1 | awk '{print $2}' | grep '^icons/' || true)

          # Also include files that were modified by svgo but already tracked (git diff)
          DIFF_CHANGED=$(git ls-files -m | grep '^icons/' || true)

          # Combine unique file paths
          FILES=$(printf "%s\n%s\n" "$CHANGED" "$DIFF_CHANGED" | sort -u | sed '/^$/d' || true)

          if [ -n "$FILES" ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            # Ensure every file still exists (skip deleted files) and add them
            echo "$FILES" | while read -r f; do
              [ -f "$f" ] && git add "$f"
            done

            # Only commit if staging area has changes
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "style: apply SVG compression and cleanup"
              git push || echo "Push failed (likely a fork PR). Please apply changes manually."
            else
              echo "No files to commit after filtering."
            fi
          else
            echo "No changes detected in icons/."
          fi

